name: Solar8 Daily News

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "send veya reset"
        required: true
        default: "send"

  schedule:
    # schedule refresh
    - cron: "0 5 * * *" 

jobs:
  run-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run news script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

        run: |
          if [ "${{ github.event.inputs.mode }}" = "reset" ]; then
            python daily_news.py reset
          else
            python daily_news.py
          fi

      - name: Commit updated memory
        if: always()
        run: |
          git config user.name "solar8-news-bot"
          git config user.email "solar8-news-bot@users.noreply.github.com"
          git add sent_events.json
          git commit -m "Update sent events memory" || echo "No memory changes"
          git push
