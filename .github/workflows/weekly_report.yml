name: Solar8 Weekly Telegram Report

on:
  schedule:
    - cron: '0 17 * * 0'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot openai python-dotenv httpx

    - name: Run Weekly Report Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        CHAT_ID: ${{ secrets.CHAT_ID }} # Daily ile birebir aynı secret'ı kullanıyoruz
      run: python weekly_report.py force